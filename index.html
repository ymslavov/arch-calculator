<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калкулатор за арки</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f5;
    color: #222;
    padding: 16px;
  }
  h1 { font-size: 20px; margin-bottom: 14px; text-align: center; }
  .layout { display: flex; gap: 16px; max-width: 1200px; margin: 0 auto; }
  .canvas-wrap {
    flex: 1;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px;
    min-width: 0;
  }
  canvas { display: block; width: 100%; height: auto; }
  .controls {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .panel {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 14px;
  }
  .panel h2 {
    font-size: 14px;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 2px solid;
  }
  .panel.big h2 { border-color: #336; color: #336; }
  .panel.small h2 { border-color: #c00; color: #c00; }
  .panel.info h2 { border-color: #555; color: #555; }
  .field { margin-bottom: 10px; }
  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #555;
    margin-bottom: 3px;
    flex-wrap: wrap;
    gap: 4px;
  }
  .field label .lbl { flex: 1; min-width: 100px; }
  input[type=range] { width: 100%; margin: 2px 0; }
  .panel.small input[type=range] { accent-color: #c00; }
  .panel.big input[type=range] { accent-color: #336; }
  .num-input {
    width: 56px;
    padding: 4px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #ccc;
    border-radius: 3px;
    text-align: right;
  }
  .info-grid {
    display: grid;
    grid-template-columns: auto 1fr 1fr;
    gap: 4px 10px;
    font-size: 12px;
  }
  .info-grid .hdr { font-weight: 600; padding-bottom: 4px; border-bottom: 1px solid #eee; }
  .info-grid .big-v { color: #336; font-weight: 600; }
  .info-grid .small-v { color: #c00; font-weight: 600; }

  /* Mobile: stack vertically, canvas on top */
  @media (max-width: 740px) {
    .layout { flex-direction: column; }
    .controls { width: 100%; }
    h1 { font-size: 18px; }
    .panel { padding: 12px; }
    .field label { font-size: 13px; }
    .num-input { width: 60px; font-size: 14px; padding: 6px; }
    input[type=range] { height: 28px; }
  }
</style>
</head>
<body>

<h1>Калкулатор за арки</h1>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="controls">
    <div class="panel small">
      <h2>Малка арка</h2>
      <div class="field">
        <label><span class="lbl">Ширина</span> <span><input class="num-input" type="number" id="n-sw" value="185" min="50" max="400" step="1" oninput="syncFromNum('sw')"> см</span></label>
        <input type="range" id="s-sw" min="50" max="400" step="1" value="185" oninput="syncFromSlider('sw')">
      </div>
      <div class="field">
        <label><span class="lbl">Springing</span> <span><input class="num-input" type="number" id="n-ss" value="218" min="180" max="244" step="0.5" oninput="syncFromNum('ss')"> см</span></label>
        <input type="range" id="s-ss" min="180" max="244" step="0.5" value="218" oninput="syncFromSlider('ss')">
      </div>
      <div class="field">
        <label><span class="lbl">Rise</span> <span><input class="num-input" type="number" id="n-sr" value="12" min="1" max="50" step="0.5" oninput="syncFromNum('sr')"> см</span></label>
        <input type="range" id="s-sr" min="1" max="50" step="0.5" value="12" oninput="syncFromSlider('sr')">
      </div>
    </div>

    <div class="panel big">
      <h2>Голяма арка (референтна)</h2>
      <div class="field">
        <label><span class="lbl">Ширина</span> <span><input class="num-input" type="number" id="n-bw" value="355" min="100" max="500" step="1" oninput="syncFromNum('bw')"> см</span></label>
        <input type="range" id="s-bw" min="100" max="500" step="1" value="355" oninput="syncFromSlider('bw')">
      </div>
      <div class="field">
        <label><span class="lbl">Springing</span> <span><input class="num-input" type="number" id="n-bs" value="218" min="180" max="244" step="0.5" oninput="syncFromNum('bs')"> см</span></label>
        <input type="range" id="s-bs" min="180" max="244" step="0.5" value="218" oninput="syncFromSlider('bs')">
      </div>
      <div class="field">
        <label><span class="lbl">Rise</span> <span><input class="num-input" type="number" id="n-br" value="26" min="1" max="50" step="0.5" oninput="syncFromNum('br')"> см</span></label>
        <input type="range" id="s-br" min="1" max="50" step="0.5" value="26" oninput="syncFromSlider('br')">
      </div>
    </div>

    <div class="panel info">
      <h2>Изчислени стойности</h2>
      <div class="info-grid">
        <span class="hdr"></span><span class="hdr">Голяма</span><span class="hdr">Малка</span>
        <span>Най-висока т.</span><span class="big-v" id="i-bt">244</span><span class="small-v" id="i-st">230</span>
        <span>Радиус</span><span class="big-v" id="i-br">619</span><span class="small-v" id="i-sr">363</span>
        <span>Rise / span</span><span class="big-v" id="i-brs">7.3%</span><span class="small-v" id="i-srs">6.5%</span>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const GAP = 30;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth - 16;
  const h = Math.max(300, Math.min(520, w * 0.58));
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  update();
}

function syncFromSlider(id) {
  document.getElementById('n-' + id).value = document.getElementById('s-' + id).value;
  update();
}
function syncFromNum(id) {
  document.getElementById('s-' + id).value = document.getElementById('n-' + id).value;
  update();
}

function getVals() {
  return {
    sw: parseFloat(document.getElementById('s-sw').value),
    ss: parseFloat(document.getElementById('s-ss').value),
    sr: parseFloat(document.getElementById('s-sr').value),
    bw: parseFloat(document.getElementById('s-bw').value),
    bs: parseFloat(document.getElementById('s-bs').value),
    br: parseFloat(document.getElementById('s-br').value),
  };
}

function calcR(span, rise) {
  return (span ** 2) / (8 * rise) + rise / 2;
}

function archPath(ctx, x0, span, spring, rise, scale, floorY) {
  const R = calcR(span, rise);
  const cx = x0 + (span * scale) / 2;
  const springY = floorY - spring * scale;
  const cy = springY + (R - rise) * scale;
  const halfAngle = Math.asin((span / 2) / R);
  const startAngle = 3 * Math.PI / 2 - halfAngle;
  const endAngle = 3 * Math.PI / 2 + halfAngle;

  ctx.moveTo(x0, floorY);
  ctx.lineTo(x0, springY);
  ctx.arc(cx, cy, R * scale, startAngle, endAngle, false);
  ctx.lineTo(x0 + span * scale, floorY);
  ctx.closePath();
}

function drawWallWithArches(ctx, v, scale, floorY, marginL, W, marginR) {
  const smallX0 = marginL;
  const bigX0 = marginL + (v.sw + GAP) * scale;
  const maxTop = Math.max(v.bs + v.br, v.ss + v.sr);
  const wallTop = floorY - (maxTop + 12) * scale;
  const wallRight = bigX0 + v.bw * scale;

  ctx.save();
  ctx.fillStyle = '#d0d0d0';
  ctx.beginPath();
  ctx.rect(smallX0 - 4, wallTop, wallRight - smallX0 + 8, floorY - wallTop);
  ctx.fill();

  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  archPath(ctx, smallX0, v.sw, v.ss, v.sr, scale, floorY);
  ctx.fill();
  ctx.beginPath();
  archPath(ctx, bigX0, v.bw, v.bs, v.br, scale, floorY);
  ctx.fill();

  ctx.globalCompositeOperation = 'source-over';
  ctx.beginPath();
  archPath(ctx, smallX0, v.sw, v.ss, v.sr, scale, floorY);
  ctx.strokeStyle = '#c00';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  archPath(ctx, bigX0, v.bw, v.bs, v.br, scale, floorY);
  ctx.strokeStyle = '#224';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

function update() {
  const v = getVals();
  const bigR = calcR(v.bw, v.br);
  const smallR = calcR(v.sw, v.sr);

  document.getElementById('i-bt').textContent = (v.bs + v.br).toFixed(1) + ' см';
  document.getElementById('i-st').textContent = (v.ss + v.sr).toFixed(1) + ' см';
  document.getElementById('i-br').textContent = bigR.toFixed(0) + ' см';
  document.getElementById('i-sr').textContent = smallR.toFixed(0) + ' см';
  document.getElementById('i-brs').textContent = (v.br / v.bw * 100).toFixed(1) + '%';
  document.getElementById('i-srs').textContent = (v.sr / v.sw * 100).toFixed(1) + '%';

  draw(v);
}

function draw(v) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;
  ctx.clearRect(0, 0, W, H);

  const totalSpan = v.sw + GAP + v.bw;
  const maxTop = Math.max(v.bs + v.br, v.ss + v.sr);
  const marginL = Math.min(55, W * 0.07);
  const marginR = Math.min(25, W * 0.03);
  const marginT = 35;
  const marginB = 40;
  const drawW = W - marginL - marginR;
  const drawH = H - marginT - marginB;
  const scale = Math.min(drawW / totalSpan, drawH / (maxTop + 5));

  const floorY = H - marginB;
  const smallX0 = marginL;
  const bigX0 = marginL + (v.sw + GAP) * scale;
  const fontSize = Math.max(10, Math.min(13, W / 70));

  // Floor
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(marginL - 10, floorY);
  ctx.lineTo(W - marginR + 5, floorY);
  ctx.stroke();

  // Wall + arches
  drawWallWithArches(ctx, v, scale, floorY, marginL, W, marginR);

  // Reference lines
  const lines = [
    { y: v.bs + v.br, label: (v.bs + v.br).toFixed(0), color: '#99b', dash: [4, 4] },
    { y: v.bs, label: v.bs.toFixed(0), color: '#bbb', dash: [2, 3] },
  ];
  if (Math.abs(v.ss - v.bs) > 0.5)
    lines.push({ y: v.ss, label: v.ss.toFixed(0), color: '#daa', dash: [2, 3] });
  if (Math.abs((v.ss + v.sr) - (v.bs + v.br)) > 0.5)
    lines.push({ y: v.ss + v.sr, label: (v.ss + v.sr).toFixed(1), color: '#c88', dash: [3, 3] });

  for (const ln of lines) {
    const py = floorY - ln.y * scale;
    ctx.save();
    ctx.strokeStyle = ln.color;
    ctx.lineWidth = 0.7;
    ctx.setLineDash(ln.dash);
    ctx.beginPath();
    ctx.moveTo(marginL - 6, py);
    ctx.lineTo(W - marginR, py);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = ln.color;
    ctx.font = (fontSize - 1) + 'px -apple-system, Arial';
    ctx.textAlign = 'right';
    ctx.fillText(ln.label, marginL - 9, py + 4);
    ctx.restore();
  }

  // Width dims
  ctx.textAlign = 'center';
  const sw2 = smallX0 + v.sw * scale;
  ctx.strokeStyle = '#c00'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(smallX0, floorY + 14); ctx.lineTo(sw2, floorY + 14);
  ctx.moveTo(smallX0, floorY + 8); ctx.lineTo(smallX0, floorY + 20);
  ctx.moveTo(sw2, floorY + 8); ctx.lineTo(sw2, floorY + 20);
  ctx.stroke();
  ctx.fillStyle = '#c00'; ctx.font = fontSize + 'px -apple-system, Arial';
  ctx.fillText(v.sw + ' см', (smallX0 + sw2) / 2, floorY + 30);

  const bw2 = bigX0 + v.bw * scale;
  ctx.strokeStyle = '#224';
  ctx.beginPath();
  ctx.moveTo(bigX0, floorY + 14); ctx.lineTo(bw2, floorY + 14);
  ctx.moveTo(bigX0, floorY + 8); ctx.lineTo(bigX0, floorY + 20);
  ctx.moveTo(bw2, floorY + 8); ctx.lineTo(bw2, floorY + 20);
  ctx.stroke();
  ctx.fillStyle = '#224';
  ctx.fillText(v.bw + ' см', (bigX0 + bw2) / 2, floorY + 30);

  // Top labels
  const smallTopY = floorY - (v.ss + v.sr) * scale;
  ctx.fillStyle = '#c00';
  ctx.font = 'bold ' + fontSize + 'px -apple-system, Arial';
  ctx.fillText((v.ss + v.sr).toFixed(1) + ' см', smallX0 + v.sw * scale / 2, smallTopY - 13);
  ctx.font = (fontSize - 2) + 'px -apple-system, Arial';
  ctx.fillText('rise ' + v.sr + '  |  R ' + calcR(v.sw, v.sr).toFixed(0), smallX0 + v.sw * scale / 2, smallTopY - 1);

  const bigTopY = floorY - (v.bs + v.br) * scale;
  ctx.fillStyle = '#224';
  ctx.font = 'bold ' + fontSize + 'px -apple-system, Arial';
  ctx.fillText((v.bs + v.br).toFixed(1) + ' см', bigX0 + v.bw * scale / 2, bigTopY - 13);
  ctx.font = (fontSize - 2) + 'px -apple-system, Arial';
  ctx.fillText('rise ' + v.br + '  |  R ' + bigR.toFixed(0), bigX0 + v.bw * scale / 2, bigTopY - 1);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>

</body>
</html>
